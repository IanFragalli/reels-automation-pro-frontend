<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reels Automation Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div id="root"></div>

  <script>
    // App sem React (vanilla JS)
    let step = 'welcome';
    let niche = '';
    let scripts = [];

    function render() {
      const root = document.getElementById('root');
      
      if (step === 'welcome') {
        root.innerHTML = `
          <div class="min-h-screen bg-gradient-to-br from-pink-50 via-purple-50 to-blue-50 py-16">
            <div class="max-w-6xl mx-auto px-4 text-center">
              <h1 class="text-5xl font-bold text-purple-600 mb-4">
                Reels Automation Pro
              </h1>
              <p class="text-xl text-gray-700 mb-12">
                Gere scripts virais em 60 segundos
              </p>
              <button
                onclick="step = 'questionnaire'; render()"
                class="bg-gradient-to-r from-purple-600 to-pink-600 text-white px-8 py-4 rounded-lg font-bold text-lg"
              >
                Gerar Scripts Grátis
              </button>
            </div>
          </div>
        `;
      } else if (step === 'questionnaire') {
        root.innerHTML = `
          <div class="min-h-screen bg-gradient-to-br from-pink-50 via-purple-50 to-blue-50 py-16">
            <div class="max-w-2xl mx-auto px-4">
              <div class="bg-white rounded-lg shadow-lg p-8">
                <h2 class="text-2xl font-bold mb-6">Qual é seu nicho?</h2>
                <input
                  type="text"
                  id="nicheInput"
                  placeholder="Ex: Marketing, Saúde..."
                  class="w-full border-2 border-gray-300 rounded-lg p-4 mb-6"
                  onchange="niche = this.value"
                />
                <button
                  onclick="generateScripts()"
                  class="w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white py-3 rounded-lg font-bold"
                >
                  Gerar Scripts
                </button>
              </div>
            </div>
          </div>
        `;
      } else if (step === 'generating') {
        root.innerHTML = `
          <div class="min-h-screen bg-gradient-to-br from-pink-50 via-purple-50 to-blue-50 flex items-center justify-center">
            <div class="text-center">
              <div class="text-6xl mb-4">⏳</div>
              <h2 class="text-3xl font-bold mb-4">Gerando scripts...</h2>
            </div>
          </div>
        `;
      } else if (step === 'scripts') {
        let scriptsHTML = scripts.map((s, i) => `
          <div class="bg-white rounded-lg shadow-lg p-6">
            <h3 class="text-2xl font-bold text-purple-600 mb-4">${s.titulo}</h3>
            <p class="mb-4"><strong>Gancho:</strong> ${s.gancho}</p>
            <p class="mb-4"><strong>Desenvolvimento:</strong> ${s.desenvolvimento}</p>
            <p class="mb-4"><strong>CTA:</strong> ${s.cta}</p>
            <p><strong>Duração:</strong> ${s.duracao}</p>
          </div>
        `).join('');

        root.innerHTML = `
          <div class="min-h-screen bg-gradient-to-br from-pink-50 via-purple-50 to-blue-50 py-16">
            <div class="max-w-4xl mx-auto px-4">
              <h2 class="text-4xl font-bold text-center mb-12">Seus Scripts!</h2>
              <div class="space-y-8">
                ${scriptsHTML}
              </div>
              <div class="text-center mt-12">
                <button
                  onclick="step = 'welcome'; render()"
                  class="bg-gray-500 text-white px-8 py-4 rounded-lg font-bold"
                >
                  Voltar
                </button>
              </div>
            </div>
          </div>
        `;
      }
    }

    async function generateScripts() {
      step = 'generating';
      render();
      
      try {
        const response = await fetch('/api/generate-scripts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userData: { niche } })
        });
        
        const data = await response.json();
        scripts = data.scripts || [];
      } catch (error) {
        console.error('Erro:', error);
        scripts = [{
          titulo: 'Script Exemplo',
          gancho: 'Hook aqui',
          desenvolvimento: 'Conteúdo aqui',
          cta: 'Clique para saber mais',
          duracao: '22s'
        }];
      }
      
      step = 'scripts';
      render();
    }

    // Renderizar inicial
    render();
  </script>
</body>
</html>
