<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reels Automation Pro</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script>
    const { useState } = React;

    function App() {
      const [step, setStep] = useState('welcome');
      const [niche, setNiche] = useState('');
      const [scripts, setScripts] = useState([]);
      const [loading, setLoading] = useState(false);

      const generateScripts = async () => {
        setLoading(true);
        setStep('generating');
        
        try {
          const response = await fetch('/api/generate-scripts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userData: { niche } })
          });
          
          const data = await response.json();
          setScripts(data.scripts || []);
          setStep('scripts');
        } catch (error) {
          console.error('Erro:', error);
          setScripts([{
            titulo: 'Script Exemplo',
            gancho: 'Hook aqui',
            desenvolvimento: 'Conteúdo',
            cta: 'CTA',
            duracao: '22s',
            dificuldade: 'Fácil'
          }]);
          setStep('scripts');
        } finally {
          setLoading(false);
        }
      };

      if (step === 'welcome') {
        return (
          <div className="min-h-screen bg-gradient-to-br from-pink-50 via-purple-50 to-blue-50 py-16">
            <div className="max-w-6xl mx-auto px-4 text-center">
              <h1 className="text-5xl font-bold text-purple-600 mb-4">
                Reels Automation Pro
              </h1>
              <p className="text-xl text-gray-700 mb-12">
                Gere scripts virais em 60 segundos
              </p>
              <button
                onClick={() => setStep('questionnaire')}
                className="bg-gradient-to-r from-purple-600 to-pink-600 text-white px-8 py-4 rounded-lg font-bold text-lg"
              >
                Gerar Scripts Grátis
              </button>
            </div>
          </div>
        );
      }

      if (step === 'questionnaire') {
        return (
          <div className="min-h-screen bg-gradient-to-br from-pink-50 via-purple-50 to-blue-50 py-16">
            <div className="max-w-2xl mx-auto px-4">
              <div className="bg-white rounded-lg shadow-lg p-8">
                <h2 className="text-2xl font-bold mb-6">Qual é seu nicho?</h2>
                <input
                  type="text"
                  placeholder="Ex: Marketing, Saúde..."
                  className="w-full border-2 border-gray-300 rounded-lg p-4 mb-6"
                  onChange={(e) => setNiche(e.target.value)}
                />
                <button
                  onClick={generateScripts}
                  className="w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white py-3 rounded-lg font-bold"
                >
                  Gerar Scripts
                </button>
              </div>
            </div>
          </div>
        );
      }

      if (step === 'generating') {
        return (
          <div className="min-h-screen bg-gradient-to-br from-pink-50 via-purple-50 to-blue-50 flex items-center justify-center">
            <div className="text-center">
              <div className="text-4xl mb-4">⏳</div>
              <h2 className="text-3xl font-bold mb-4">Gerando scripts...</h2>
            </div>
          </div>
        );
      }

      if (step === 'scripts') {
        return (
          <div className="min-h-screen bg-gradient-to-br from-pink-50 via-purple-50 to-blue-50 py-16">
            <div className="max-w-4xl mx-auto px-4">
              <h2 className="text-4xl font-bold text-center mb-12">Seus Scripts!</h2>
              <div className="space-y-8">
                {scripts.map((script, idx) => (
                  <div key={idx} className="bg-white rounded-lg shadow-lg p-6">
                    <h3 className="text-2xl font-bold text-purple-600 mb-4">{script.titulo}</h3>
                    <p className="mb-4"><strong>Gancho:</strong> {script.gancho}</p>
                    <p className="mb-4"><strong>Desenvolvimento:</strong> {script.desenvolvimento}</p>
                    <p className="mb-4"><strong>CTA:</strong> {script.cta}</p>
                    <p><strong>Duração:</strong> {script.duracao}</p>
                  </div>
                ))}
              </div>
              <div className="text-center mt-12">
                <button
                  onClick={() => setStep('welcome')}
                  className="bg-gray-500 text-white px-8 py-4 rounded-lg font-bold"
                >
                  Voltar
                </button>
              </div>
            </div>
          </div>
        );
      }
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
