<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reels Automation Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="min-h-screen bg-gradient-to-br from-pink-50 to-purple-50 flex flex-col items-center justify-center p-4">
    <div class="text-center max-w-2xl">
      <h1 class="text-5xl font-bold text-purple-600 mb-4">Reels Automation Pro</h1>
      <p class="text-xl text-gray-700 mb-8">Gere scripts virais em 60 segundos</p>
      
      <div class="bg-white rounded-lg shadow-lg p-8 mb-8">
        <input 
          type="text" 
          id="niche" 
          placeholder="Digite seu nicho (ex: Marketing)"
          class="w-full border-2 border-gray-300 rounded-lg p-4 mb-4"
        />
        <button 
          onclick="gerarScripts()"
          class="w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white py-3 rounded-lg font-bold"
        >
          Gerar Scripts
        </button>
      </div>

      <div id="resultado"></div>
    </div>
  </div>

  <script>
    async function gerarScripts() {
      const niche = document.getElementById('niche').value;
      const resultado = document.getElementById('resultado');
      
      resultado.innerHTML = '<p class="text-gray-600">Carregando...</p>';
      
      try {
        const response = await fetch('/api/generate-scripts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ userData: { niche } })
        });
        
        const data = await response.json();
        
        if (data.scripts && data.scripts.length > 0) {
          resultado.innerHTML = `
            <div class="bg-white rounded-lg shadow-lg p-8 text-left">
              <h2 class="text-2xl font-bold mb-6">Seus Scripts:</h2>
              ${data.scripts.map((s, i) => `
                <div class="mb-6 pb-6 border-b">
                  <h3 class="font-bold text-lg text-purple-600">${i+1}. ${s.titulo}</h3>
                  <p><strong>Gancho:</strong> ${s.gancho}</p>
                  <p><strong>Desenvolvimento:</strong> ${s.desenvolvimento}</p>
                  <p><strong>CTA:</strong> ${s.cta}</p>
                  <p><strong>Duração:</strong> ${s.duracao}</p>
                </div>
              `).join('')}
            </div>
          `;
        } else {
          resultado.innerHTML = '<p class="text-gray-600">Nenhum script gerado</p>';
        }
      } catch (error) {
        console.error('Erro:', error);
        resultado.innerHTML = '<p class="text-red-600">Erro ao conectar ao servidor</p>';
      }
    }
  </script>
</body>
</html>
