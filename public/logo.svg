<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo gradiente -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Círculo base -->
  <circle cx="100" cy="100" r="95" fill="url(#grad1)" opacity="0.1"/>
  
  <!-- Flow lines (movimento) -->
  <path d="M 60 100 Q 80 80 100 70 Q 120 80 140 100" stroke="url(#grad1)" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 60 100 Q 80 120 100 130 Q 120 120 140 100" stroke="url(#grad1)" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Play triangle (reel) -->
  <polygon points="85,85 85,115 120,100" fill="url(#grad1)"/>
  
  <!-- Outer ring -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="url(#grad1)" stroke-width="2" opacity="0.3"/>
</svg>